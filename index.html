<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Card</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <section class="profile-card">
        
        <img src="images/pic1.jpg" alt="Nurullah's avatar" class="profile-avatar">
        
        <h1 class="profile-name">Md Nurullah Siddiqui</h1>
        <p class="profile-bio">Frontend Developer & UI Designer</p>
        
        <ul class="profile-stats">
            <li><strong>80K</strong> Followers</li>
            <li><strong>20K</strong> Following</li>
        </ul>
        
        <button class="profile-button">Follow</button>

    </section>

</body>
</html>
